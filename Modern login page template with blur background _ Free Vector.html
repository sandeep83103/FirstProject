<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Login Template</title>
  <style>
    :root {
      --bg-primary: #1f1c2c;
      --bg-secondary: #928dab;
      --card-bg: rgba(255, 255, 255, 0.15);
      --input-bg: rgba(255, 255, 255, 0.22);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.82);
      --accent: #7c5cff;
      --accent-hover: #6d4dff;
      --shadow: 0 18px 45px rgba(10, 10, 25, 0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(130deg, var(--bg-primary), var(--bg-secondary));
      color: var(--text-main);
      overflow: hidden;
      padding: 20px;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      filter: blur(35px);
      opacity: 0.55;
      z-index: 0;
    }

    body::before {
      top: -80px;
      left: -90px;
      background: #60efff;
    }

    body::after {
      bottom: -90px;
      right: -70px;
      background: #ff6ec7;
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px 26px;
      position: relative;
      z-index: 1;
    }

    .login-card h1 {
      font-size: 1.7rem;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: var(--input-bg);
      color: #fff;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.65);
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.75);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 6px 0 18px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .form-options a,
    .signup a {
      color: #fff;
      text-decoration: none;
    }

    .form-options a:hover,
    .signup a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .signup {
      margin-top: 16px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Welcome Back</h1>
    <p>Please sign in to continue</p>

    <form>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required />
      </div>

      <div class="form-options">
        <label>
          <input type="checkbox" style="width:auto; margin-right:6px;" />
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Log In</button>
    </form>

    <div class="signup">
      Don't have an account? <a href="#">Sign up</a>
    </div>
  </main>
</body>
</html>
